<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Oise au Jardin</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#2c5f2e">
    <link rel="apple-touch-icon" href="../images/logo.png">
    <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
    <style>
        body {
            min-height: 100vh;
            background:
                linear-gradient(rgba(0,0,0,0.40), rgba(0,0,0,0.40)),
                url("./images/lawn.jpg");
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .auth-card img {
            height: 80px;
            width: auto;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .auth-card h2 {
            margin-bottom: 24px;
            color: #2c5f2e;
        }

        .auth-card input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
        }

        .auth-card input:focus {
            outline: none;
            border-color: #2c5f2e;
        }

        .auth-card .btn {
            width: 100%;
            padding: 12px;
            background-color: #2c5f2e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 5px;
        }

        .auth-card .btn:hover {
            background-color: #1e4220;
        }

        .auth-card p {
            margin-top: 20px;
            color: #555;
            font-size: 14px;
        }

        .auth-card a {
            color: #2c5f2e;
            font-weight: 600;
            text-decoration: none;
        }

        .auth-card a:hover {
            text-decoration: underline;
        }

        .back-link {
            margin-top: 20px;
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <img src="images/logo.png" alt="Oise au Jardin logo">
        <h2>Se Connecter</h2>

        <form id="login-form">
            <input type="email" id="login-email" placeholder="Votre e-mail" required>
            <input type="password" id="login-password" placeholder="Votre mot de passe" required>
            <p id="login-error" style="color:#c0392b;font-size:14px;display:none;margin-bottom:10px;"></p>
            <button type="submit" class="btn" id="login-btn">Se connecter</button>
        </form>

        <p>Pas encore de compte ? <a href="../signup.html/Signup.html">S'inscrire</a></p>
    </div>

    <a href="../index.html" class="back-link">← Retour à l'accueil</a>

</body>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    const firebaseConfig = { apiKey:"AIzaSyD2MMsLW-Lm56SCVOECyX80OWQMmZ9qKbI", authDomain:"oise-au-jardin.firebaseapp.com", projectId:"oise-au-jardin", storageBucket:"oise-au-jardin.firebasestorage.app", messagingSenderId:"895167286481", appId:"1:895167286481:web:6c4853a9c793c3aed149f0" };
    const auth = getAuth(initializeApp(firebaseConfig));
    document.getElementById('login-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('login-btn');
        const err = document.getElementById('login-error');
        btn.disabled = true; btn.textContent = 'Connexion en cours...';
        try {
            await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-password').value);
            window.location.href = '../profile.html';
        } catch {
            err.textContent = 'E-mail ou mot de passe incorrect.';
            err.style.display = 'block';
            btn.disabled = false; btn.textContent = 'Se connecter';
        }
    });
</script>
</html>
